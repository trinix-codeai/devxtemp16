version: "3.9"
services:
  postgres:
    image: postgres:16
    container_name: localxplore-postgres
    environment:
      POSTGRES_USER: localxplore
      POSTGRES_PASSWORD: localxplore
      POSTGRES_DB: localxplore
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: localxplore-redis
    ports:
      - "6379:6379"

volumes:
  pgdata:
